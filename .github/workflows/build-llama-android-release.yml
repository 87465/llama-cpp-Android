name: Build llama-server for Android 9+ (OpenCL Only)

# 修改点1: 移除 schedule 触发，仅保留 workflow_dispatch
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'llama.cpp 仓库 (owner/repo)'
        required: true
        default: 'ggml-org/llama.cpp'
      build_type:
        description: 'Release 或 Debug'
        required: true
        default: 'Release'

env:
  REPO: ${{ github.event.inputs.repo || 'ggml-org/llama.cpp' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  BUILD_DIR: build-android
  NDK_VERSION: r27d
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get_tag:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: 获取上游最新稳定 Tag
        id: get_tag
        uses: oprypin/find-latest-tag@v1
        with:
          repository: ${{ env.REPO }}
          regex: '^b[0-9]+$'
          sort-tags: true

  build:
    needs: get_tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: armv9-opt
            artifact_name: llama-server-armv9-a
            cmake_flags: '-DCMAKE_C_FLAGS="-march=armv9-a+nosve+dotprod+i8mm -mtune=cortex-a710" -DCMAKE_CXX_FLAGS="-march=armv9-a+nosve+dotprod+i8mm -mtune=cortex-a710" -DGGML_ARM_I8MM=ON -DGGML_ARM_DOTPROD=ON -DGGML_CPU_AARCH64_REPACK=ON'
          - name: opencl-gpu
            artifact_name: llama-server-opencl-gpu
            cmake_flags: '-DCMAKE_C_FLAGS="-march=armv8-a" -DCMAKE_CXX_FLAGS="-march=armv8-a" -DGGML_ARM_I8MM=OFF -DGGML_ARM_DOTPROD=OFF -DGGML_CPU_AARCH64_REPACK=OFF -DLLAMA_OPENCL=ON'  # 修改点2: GPU后端明确为OpenCL

    steps:
      - name: 安装构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build opencl-headers
      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
      - name: 克隆 llama.cpp
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ needs.get_tag.outputs.latest_tag }}
          path: llama.cpp
          fetch-depth: 1
      - name: 配置 & 编译
        working-directory: llama.cpp
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \  # 安卓9对应API 28
            ${{ matrix.cmake_flags }} \
            -DGGML_OPENMP=ON \
            -DOpenMP_C_FLAGS="-fopenmp -static-openmp" \
            -DOpenMP_CXX_FLAGS="-fopenmp -static-openmp" \
            -DGGML_LLAMAFILE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DANDROID_STL=c++_static \
            -DGGML_BLAS=OFF \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_EXE_LINKER_FLAGS="-static-openmp -Wl,-Bstatic -lomp -Wl,-Bdynamic" \
            -G Ninja
          cmake --build . --config "${{ env.BUILD_TYPE }}" -j $(nproc)
      - name: 上传 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: llama.cpp/${{ env.BUILD_DIR }}/bin/llama-server
          retention-days: 15
