name: Build Android Native arm64 llama-server (Pure CPU - 官方优化版 + Tag 稳定检测)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'llama.cpp 仓库 (owner/repo)'
        required: true
        default: 'ggml-org/llama.cpp'
      ref:
        description: '分支或 Tag (master / bxxxx)'
        required: true
        default: 'master'
      build_type:
        description: 'Release 或 Debug'
        required: true
        default: 'Release'
  schedule:
    - cron: '0 0 * * *'   # 每日 UTC 0 点检测新 Tag

env:
  REPO: ${{ github.event.inputs.repo || 'ggml-org/llama.cpp' }}
  REF: ${{ github.event.inputs.ref || 'master' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  BUILD_DIR: build-android
  NDK_VERSION: r27d
  RELEASE_TAG_PREFIX: "llama-server-android-"
  RELEASE_NAME_PREFIX: "llama-server Android arm64 (Pure CPU, armv8.7a, Android 15 ready) "
  ARTIFACT_NAME: "llama-server-android-arm64-native-cpu"

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装 CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.x'

      - name: 安装 Ninja
        uses: wirekang/setup-ninja@v1
        with:
          platform: linux
          tag: v1.11.1

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      # ---------- 获取最新稳定 Tag ----------
      - name: 获取上游最新稳定 Tag (bXXXX)
        id: get_tag
        run: |
          LATEST_TAG=$(git ls-remote --tags "https://github.com/$REPO.git" | \
                       awk '{print $2}' | grep '^refs/tags/b[0-9]*' | \
                       sed 's|refs/tags/||' | sort -V | tail -1)
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: 恢复上次构建的 Tag 缓存
        id: cache-restore
        uses: actions/cache/restore@v3
        with:
          path: last_tag.txt
          key: last-tag-${{ env.REPO }}

      - name: 判断是否需要构建（仅新稳定 Tag 时触发）
        id: check
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ -f last_tag.txt ]; then
              LAST_TAG=$(cat last_tag.txt)
              if [ "\( LAST_TAG" == " \){{ steps.get_tag.outputs.latest_tag }}" ]; then
                echo "✅ 无新稳定 Tag（bXXXX 未更新），跳过构建"
                echo "skip=true" >> $GITHUB_OUTPUT
              else
                echo "🆕 检测到新稳定 Tag ${{ steps.get_tag.outputs.latest_tag }}，开始构建"
                echo "skip=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "📦 首次运行，开始构建"
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "🚀 手动触发，强制构建"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 克隆 llama.cpp（使用最新稳定 Tag）
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          ref: ${{ steps.get_tag.outputs.latest_tag }}
          path: llama.cpp
          fetch-depth: 1

      - name: 获取短 SHA
        if: steps.check.outputs.skip != 'true'
        working-directory: llama.cpp
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: 配置 & 编译 (Pure CPU, 官方 armv8.7a 优化)
        if: steps.check.outputs.skip != 'true'
        working-directory: llama.cpp
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-34 \
            -DCMAKE_C_FLAGS="-march=armv8.7a" \
            -DCMAKE_CXX_FLAGS="-march=armv8.7a" \
            -DGGML_OPENMP=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DANDROID_STL=c++_static \
            -DGGML_BLAS=OFF \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -G Ninja
          cmake --build . --config "${{ env.BUILD_TYPE }}" -j $(nproc)

      - name: 准备二进制文件
        if: steps.check.outputs.skip != 'true'
        run: |
          cp llama.cpp/${{ env.BUILD_DIR }}/bin/llama-server ./llama-server
          chmod +x ./llama-server

      - name: 上传 Artifact
        if: steps.check.outputs.skip != 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./llama-server
          retention-days: 15

      - name: 创建 Release 标签和名称
        if: steps.check.outputs.skip != 'true' && success()
        id: release_meta
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')
          TAG="\( {{ env.RELEASE_TAG_PREFIX }} \){TIMESTAMP}-${{ steps.get_tag.outputs.latest_tag }}"
          NAME="\( {{ env.RELEASE_NAME_PREFIX }} \){TIMESTAMP} (Tag ${{ steps.get_tag.outputs.latest_tag }})"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: 上传 Release 资产
        if: steps.check.outputs.skip != 'true' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: 自动构建于 ${{ steps.release_meta.outputs.name }} (Pure CPU, armv8.7a 官方优化, 基于上游稳定 Tag ${{ steps.get_tag.outputs.latest_tag }})
          files: ./llama-server
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 Releases
        if: always()
        uses: jay2610/delete-older-releases@1.0.0
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 Artifacts
        if: always()
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '30 days'
          skip-recent: 3

      - name: 清理旧的 Workflow 运行记录
        if: always()
        uses: dmvict/clean-workflow-runs@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          save_min_runs_number: 3

      - name: 保存本次构建的稳定 Tag
        if: steps.check.outputs.skip != 'true' && success()
        run: echo "${{ steps.get_tag.outputs.latest_tag }}" > last_tag.txt

      - name: 缓存本次稳定 Tag
        if: steps.check.outputs.skip != 'true' && success()
        uses: actions/cache/save@v3
        with:
          path: last_tag.txt
          key: last-tag-${{ env.REPO }}