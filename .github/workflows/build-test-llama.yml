name: Build Android Native arm64 llama-server (Magisk/KernelSU)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'llama.cpp 仓库 (owner/repo)'
        required: true
        default: 'ggml-org/llama.cpp'
      ref:
        description: '分支或 Tag (master / bxxxx)'
        required: true
        default: 'master'
      build_type:
        description: 'Release 或 Debug'
        required: true
        default: 'Release'

env:
  BUILD_DIR: build-android
  PORTABLE_DIR: llama-server-android-arm64-native
  NDK_VERSION: r27d

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: 下载 Android NDK r27d LTS
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip -O ndk.zip
          unzip -q ndk.zip
          mv android-ndk-${{ env.NDK_VERSION }} $HOME/android-ndk
          echo "ANDROID_NDK=$HOME/android-ndk" >> $GITHUB_ENV

      - name: 克隆 llama.cpp
        run: |
          git clone https://github.com/${{ inputs.repo }}.git --branch ${{ inputs.ref }} --depth 1 llama.cpp

      - name: 配置 & 编译（原生 arm64 完全静态）
        working-directory: llama.cpp
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_C_FLAGS="-march=armv8.7a" \
            -DCMAKE_CXX_FLAGS="-march=armv8.7a" \
            -DGGML_OPENMP=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DANDROID_STL=c++_static \
            -DGGML_BLAS=OFF \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -G Ninja
          cmake --build . --config \( {{ inputs.build_type }} -j \)(nproc)

      - name: 打包原生便携 ZIP（单文件静态 + Magisk 说明）
        working-directory: llama.cpp
        run: |
          mkdir -p ${{ env.PORTABLE_DIR }}
          
          # 复制静态二进制（根目录，方便 adb push）
          cp ${{ env.BUILD_DIR }}/bin/llama-server ${{ env.PORTABLE_DIR }}/llama-server
          
          # Magisk/KernelSU 专用说明文件（已修复缩进）
          cat > ${{ env.PORTABLE_DIR }}/README.txt <<-'EOF'
            【Android 原生 arm64 llama-server（Magisk/KernelSU 专用）】
            完全静态编译 · 零依赖 · 直接运行

            === 手动运行（推荐测试）===
            1. adb push llama-server /data/local/tmp/
            2. adb shell
            3. chmod 755 /data/local/tmp/llama-server
            4. /data/local/tmp/llama-server -m /sdcard/model.gguf --host 0.0.0.0 --port 8080 -c 4096 -ngl 0

            === Magisk/KernelSU 模块挂载（开机自动可用）===
            1. 在 Magisk/KernelSU App 中新建模块
            2. 把 llama-server 放到模块目录的 system/bin/llama-server
            3. module.prop 示例：
               id=llama-server
               name=llama-server
               version=1.0
               versionCode=1
               author=you
               description=llama-server arm64
            4. service.sh 示例（可选自动启动）：
               #!/system/bin/sh
               /system/bin/llama-server -m /data/adb/llama/model.gguf --port 8080 --host 0.0.0.0 -ngl 0 > /data/adb/llama.log 2>&1 &
            5. 安装模块 → 重启 → 直接在 ADB 或终端执行 llama-server

            WebUI: 浏览器打开 http://手机IP:8080
            模型建议放 /sdcard/Download/ 或 /data/adb/llama/
          EOF

      - name: 压缩成 ZIP
        working-directory: llama.cpp
        run: |
          cd ${{ env.PORTABLE_DIR }}
          zip -r ../../llama-server-android-arm64-native.zip .

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-android-arm64-native
          path: llama-server-android-arm64-native.zip
          retention-days: 30