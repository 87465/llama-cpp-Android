name: Build llama-server for 多版本

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'llama.cpp 仓库 (owner/repo)'
        required: true
        default: 'ggml-org/llama.cpp'
      build_type:
        description: 'Release 或 Debug'
        required: true
        default: 'Release'
  schedule:
    - cron: '0 0 */3 * *'   # 每 3 天 UTC 0 点检测一次

env:
  REPO: ${{ github.event.inputs.repo || 'ggml-org/llama.cpp' }}
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  BUILD_DIR: build-android
  NDK_VERSION: r27d
  # 强制使用 Node.js 24 以避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  # 1. 获取最新 tag 并判断是否需要构建
  get_tag_and_check:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.get_tag.outputs.tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: 安装 CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.x'

      - name: 安装 Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: 获取上游最新稳定 Tag (bXXXX)
        id: get_tag
        uses: oprypin/find-latest-tag@v1
        with:
          repository: ${{ env.REPO }}
          regex: '^b[0-9]+$'
          sort-tags: true

      - name: 恢复上次 Tag 缓存
        id: cache-restore
        uses: actions/cache@v5
        with:
          path: last_tag.txt
          key: last-tag-${{ env.REPO }}

      - name: 判断是否需要构建
        id: check
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.tag }}"
          if [ -z "$LATEST_TAG" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ -f last_tag.txt ] && [ "$(cat last_tag.txt)" = "$LATEST_TAG" ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: 保存 Tag 到输出
        run: echo "tag=${{ steps.get_tag.outputs.tag }}" >> $GITHUB_OUTPUT
        id: tag_out

  # 2. 并行构建矩阵（三个配置）
  build:
    needs: get_tag_and_check
    if: needs.get_tag_and_check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: armv9-opt
            artifact_name: llama-server-armv9-a
            cmake_flags: >
              -DCMAKE_C_FLAGS="-march=armv9-a+nosve+dotprod+i8mm -mtune=cortex-a710"
              -DCMAKE_CXX_FLAGS="-march=armv9-a+nosve+dotprod+i8mm -mtune=cortex-a710"
              -DGGML_ARM_I8MM=ON
              -DGGML_ARM_DOTPROD=ON
              -DGGML_CPU_AARCH64_REPACK=ON
          - name: cpu-generic
            artifact_name: llama-server-cpu
            cmake_flags: >
              -DCMAKE_C_FLAGS="-march=armv8-a"
              -DCMAKE_CXX_FLAGS="-march=armv8-a"
              -DGGML_ARM_I8MM=OFF
              -DGGML_ARM_DOTPROD=OFF
              -DGGML_CPU_AARCH64_REPACK=OFF
          - name: cpu-gpu
            artifact_name: llama-server-cpu-gpu
            cmake_flags: >
              -DCMAKE_C_FLAGS="-march=armv8-a"
              -DCMAKE_CXX_FLAGS="-march=armv8-a"
              -DGGML_ARM_I8MM=OFF
              -DGGML_ARM_DOTPROD=OFF
              -DGGML_CPU_AARCH64_REPACK=OFF
              -DGGML_VULKAN=ON

    steps:
      - name: 安装 CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.x'

      - name: 安装 Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      # GPU 版本需要安装 glslc（Vulkan 着色器编译器）
      - name: 安装 glslc (仅 GPU 版本)
        if: matrix.name == 'cpu-gpu'
        run: |
          sudo apt-get update
          sudo apt-get install -y glslc

      - name: 克隆 llama.cpp
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REPO }}
          ref: ${{ needs.get_tag_and_check.outputs.latest_tag }}
          path: llama.cpp
          fetch-depth: 1

      - name: 配置 & 编译
        working-directory: llama.cpp
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-35 \
            ${{ matrix.cmake_flags }} \
            -DGGML_OPENMP=ON \
            -DOpenMP_C_FLAGS="-fopenmp -static-openmp" \
            -DOpenMP_CXX_FLAGS="-fopenmp -static-openmp" \
            -DGGML_LLAMAFILE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DANDROID_STL=c++_static \
            -DGGML_BLAS=OFF \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_EXE_LINKER_FLAGS="-static-openmp -Wl,-Bstatic -lomp -Wl,-Bdynamic" \
            -G Ninja
          cmake --build . --config "${{ env.BUILD_TYPE }}" -j $(nproc)

      - name: 准备二进制并重命名
        run: |
          cp llama.cpp/${{ env.BUILD_DIR }}/bin/llama-server ./${{ matrix.artifact_name }}
          chmod +x ./${{ matrix.artifact_name }}

      - name: 上传 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}
          retention-days: 15

  # 3. 统一发布 Release
  release:
    needs: [get_tag_and_check, build]
    if: always() && needs.get_tag_and_check.outputs.should_build == 'true' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有 artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 列出 artifacts
        run: ls -R ./artifacts

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get_tag_and_check.outputs.latest_tag }}
          name: llama-server Android arm64 - ${{ needs.get_tag_and_check.outputs.latest_tag }}
          body: |
            **上游版本**: ${{ needs.get_tag_and_check.outputs.latest_tag }}
            **构建时间**: $(date -u +'%Y-%m-%d %H:%M UTC')
            **包含三个二进制文件**：
            - `llama-server-armv9-a`: Armv9-A 优化版本（支持 dotprod / i8mm）
            - `llama-server-cpu`: 通用 CPU 版本（armv8-a 基线）
            - `llama-server-cpu-gpu`: 通用 CPU + Vulkan GPU 版本
          files: |
            ./artifacts/llama-server-armv9-a/llama-server-armv9-a
            ./artifacts/llama-server-cpu/llama-server-cpu
            ./artifacts/llama-server-cpu-gpu/llama-server-cpu-gpu
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false

      - name: 清理旧 Releases（保留最新 5 个）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[5:][] | .tagName' | while read tag; do
            gh release delete "$tag" --cleanup-tag --yes
          done

      - name: 清理旧 Workflow Runs（保留最新 3 条）
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3

      - name: 保存本次 Tag
        run: echo "${{ needs.get_tag_and_check.outputs.latest_tag }}" > last_tag.txt

      - name: 缓存 Tag
        uses: actions/cache@v5
        with:
          path: last_tag.txt
          key: last-tag-${{ env.REPO }}