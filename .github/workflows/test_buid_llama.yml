name: Build Android Native arm64 llama-server (CPU / OpenCL / Vulkan)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'llama.cpp 仓库 (owner/repo)'
        required: true
        default: 'ggml-org/llama.cpp'
      ref:
        description: '分支或 Tag (master / bxxxx)'
        required: true
        default: 'master'
      build_type:
        description: 'Release 或 Debug'
        required: true
        default: 'Release'
      variant:
        description: '构建类型（手动选择）'
        required: true
        default: 'Pure CPU'
        type: choice
        options:
          - Pure CPU
          - OpenCL
          - Vulkan

env:
  REPO: ${{ inputs.repo }}
  REF: ${{ inputs.ref }}
  BUILD_TYPE: ${{ inputs.build_type }}
  BUILD_DIR: build-android
  NDK_VERSION: r27d
  RELEASE_TAG_PREFIX: "llama-server-android-"
  RELEASE_NAME_PREFIX: "llama-server Android arm64 "

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装 CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.x'

      - name: 安装 Ninja
        uses: wirekang/setup-ninja@v1
        with:
          platform: linux
          tag: v1.11.1

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: false

      - name: 克隆 llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          ref: ${{ env.REF }}
          path: llama.cpp
          fetch-depth: 1

      - name: 获取短 SHA
        working-directory: llama.cpp
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ==================== 新增：根据手动选择设置构建参数 ====================
      - name: 设置构建变量（Pure CPU / OpenCL / Vulkan）
        id: variant
        run: |
          case "${{ inputs.variant }}" in
            "Pure CPU")
              echo "backend=CPU" >> $GITHUB_OUTPUT
              echo "cmake_flags=" >> $GITHUB_OUTPUT
              echo "needs_opencl=false" >> $GITHUB_OUTPUT
              ;;
            "OpenCL")
              echo "backend=OpenCL" >> $GITHUB_OUTPUT
              echo "cmake_flags=-DGGML_OPENCL=ON -DGGML_OPENCL_USE_ADRENO_KERNELS=ON -DGGML_OPENCL_EMBED_KERNELS=ON" >> $GITHUB_OUTPUT
              echo "needs_opencl=true" >> $GITHUB_OUTPUT
              ;;
            "Vulkan")
              echo "backend=Vulkan" >> $GITHUB_OUTPUT
              echo "cmake_flags=-DGGML_VULKAN=ON" >> $GITHUB_OUTPUT
              echo "needs_opencl=false" >> $GITHUB_OUTPUT
              ;;
          esac

      # ==================== OpenCL 专用准备（仅在选择 OpenCL 时执行） ====================
      - name: 准备 OpenCL Headers + ICD Loader (Adreno 专用)
        if: steps.variant.outputs.needs_opencl == 'true'
        run: |
          mkdir -p \~/dev/llm
          cd \~/dev/llm

          # OpenCL Headers
          git clone https://github.com/KhronosGroup/OpenCL-Headers
          cd OpenCL-Headers
          cp -r CL $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/

          cd \~/dev/llm

          # OpenCL ICD Loader（arm64）
          git clone https://github.com/KhronosGroup/OpenCL-ICD-Loader
          cd OpenCL-ICD-Loader
          mkdir build_ndk && cd build_ndk
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DOPENCL_ICD_LOADER_HEADERS_DIR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=24 \
            -DANDROID_STL=c++_shared
          ninja
          cp libOpenCL.so $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/

      # ==================== 配置 & 编译（自动带上对应 backend） ====================
      - name: 配置 & 编译 (${{ steps.variant.outputs.backend }})
        working-directory: llama.cpp
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cd ${{ env.BUILD_DIR }}
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-34 \
            -DCMAKE_C_FLAGS="-march=armv8.4a+dotprod" \
            -DCMAKE_CXX_FLAGS="-march=armv8.4a+dotprod" \
            -DGGML_OPENMP=OFF \
            -DGGML_LLAMAFILE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DANDROID_STL=c++_static \
            -DGGML_BLAS=OFF \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            ${{ steps.variant.outputs.cmake_flags }} \
            -G Ninja
          cmake --build . --config "${{ env.BUILD_TYPE }}" -j $(nproc)

      # ==================== 准备二进制（OpenCL 时多打包 libOpenCL.so） ====================
      - name: 准备二进制文件
        run: |
          cp llama.cpp/${{ env.BUILD_DIR }}/bin/llama-server ./llama-server
          chmod +x ./llama-server
          if [ "${{ steps.variant.outputs.needs_opencl }}" = "true" ]; then
            cp $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libOpenCL.so ./libOpenCL.so
            chmod +x ./libOpenCL.so
          fi

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-android-arm64-${{ steps.variant.outputs.backend }}
          path: |
            ./llama-server
            ./libOpenCL.so
          retention-days: 15

      - name: 创建 Release 标签和名称
        id: release_meta
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')
          TAG="\( {{ env.RELEASE_TAG_PREFIX }} \){TIMESTAMP}-\( {{ env.SHORT_SHA }}- \){{ steps.variant.outputs.backend }}"
          NAME="\( {{ env.RELEASE_NAME_PREFIX }} \){TIMESTAMP} (${{ env.SHORT_SHA }}) - ${{ steps.variant.outputs.backend }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: 上传 Release 资产
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: 手动构建于 ${{ steps.release_meta.outputs.name }} (Android-34, armv8.4a+dotprod, ${{ steps.variant.outputs.backend }} backend)
          files: |
            ./llama-server
            ./libOpenCL.so
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 Releases（保留最新 3 个）
        if: always()
        uses: jay2610/delete-older-releases@1.0.0
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 Artifacts（30 天前）
        if: always()
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '30 days'
          skip-recent: 3